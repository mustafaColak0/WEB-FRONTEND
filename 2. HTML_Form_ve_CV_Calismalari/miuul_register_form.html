<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- External css -->

<link rel="stylesheet" href="login.css">
</head>

<body class="bg-light">

  <body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="card shadow-lg border-0 rounded-4" style="background-color: #f8f9fa;">
                    <div class="card-body p-5">
                        
                        <h1 class="text-center text-primary mb-2 fw-normal text-capitilaze display-5">Form Register</h1>
                        <h2 class="text-center text-success mb-5 fw-normal text-capitilaze display-6">Hoşgeldiniz</h2>
                        
                        <form action="#!" method="get" id="register_id" name="register_name">
                            
                            <div class="row mb-3 align-items-center">
                                <div class="col-sm-4">
                                    <label for="uname" class="col-form-label text-uppercase me-3 text-dark fw-bold">Username</label>
                                </div>
                                <div class="col-sm-8">
                                    <input type="text" id="uname" required placeholder="Kullanıcı adınız" class="form-control" autofocus>
                                </div>
                            </div>

                            <div class="row mb-3 align-items-center">
                                <div class="col-sm-4">
                                    <label for="name" class="col-form-label text-uppercase text-dark fw-bold">Name</label>
                                </div>
                                <div class="col-sm-8">
                                    <input type="text" id="name" required placeholder="Adınız" class="form-control">
                                </div>
                            </div>

                            <div class="row mb-3 align-items-center">
                                <div class="col-sm-4">
                                    <label for="usurname" class="col-form-label text-uppercase text-dark fw-bold">Surname</label>
                                </div>
                                <div class="col-sm-8">
                                    <input type="text" id="usurname" required placeholder="Soyadınız" class="form-control">
                                </div>
                            </div>

                            <div class="row mb-3 align-items-center">
                                <div class="col-sm-4">
                                    <label for="uemail" class="col-form-label text-uppercase text-dark fw-bold">Email</label>
                                </div>
                                <div class="col-sm-8">
                                    <input type="email" id="uemail" required placeholder="Kullanıcı Emailiniz" class="form-control">
                                </div>
                            </div>

                            <div class="row mb-4 align-items-center">
                                <div class="col-sm-4">
                                    <label for="upassword" class="col-form-label text-dark fw-bold mb- mt-3">Password</label>
                                </div>
                                <div class="col-sm-8">
                                    <input type="password" id="upassword" required placeholder="Kullanıcı Şifresi" class="form-control" minlength="3" maxlength="10">
                                </div>
                            </div>

                            <div class="row mt-4">
                                <div class="col-12 text-center">
                                    <button type="reset" class="btn btn-outline-danger px-4 me-2">Temizle</button>
                                    <button type="submit" class="btn btn-outline-primary shadow px-4">Gönder</button>
                                </div>
                            </div>
                            
                        </form>
                        
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
