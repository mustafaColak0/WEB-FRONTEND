<html>


<head>


<title> Register Form</title>

</head>



<h3>Form Register</h3>
<div class="MYZT_register_form">
    <form action="#!" method="get" id="register_id" name="register_name" enctype="">
<div class="title">Hoşgeldiniz</div>

            <!-- UserName -->
             <div>
             <tr>
                
                <td><span for="uname">username:</span></td>
                <td>



                </td>
                </tr>
                <div class="miuul_container"></div>
                <td><input type="text" id="uname" required placeholder="Kullanıcı adınız" class="miul_input" title="Kullanıcı adınız" autofocus></td>
            </div>

            </tr>
             <!-- Name -->
             <tr>
                <td><label for="name">Name:</label>
                
                    <div class="miuul_container"></div>
                    <td><input type="text" id="name" required placeholder="Adınız" class="miul_input" title="Adınızı giriniz"></td>
                </div>
             
                </tr>

                <!-- Surname -->
             <tr>
                <td><label for="surname">Surname:</label>
                
                    <div class="miuul_container"></div>
                    <td><input type="text" id="surname" required placeholder="Soyadınız" class="miul_input" title="Soyadınızı giriniz"></td>
                </div>
             
                </tr>
                <!-- email -->
                 <tr>
                <div><label for="uemail">Emaıl:</label>
                    <div class="miuul_container"></div>
                <td><input type="email" id="uemail" required placeholder="Kullanıcı Emailiniz" class="miul_input" title="Emailinizi giriniz"></td>
                </div>
            </tr>
                <!-- password -->
                    <tr>
                <td><label for="upassword">Password:</label>
                    <div class="miuul_container">
                <div><input type="password" id="upassword" required placeholder="Kullanıcı şifreniz" class="miul_input" title="Password giriniz" minlength="3" maxlength="10" pattern="[a-zA-Z0-9]{3,10}">
                </div>

                </td>
                <!-- Button Processing -->
                <tr>
                <td></td> <td>      <input type="reset" value="Sıfırla">
                    <button type="submit">Gönder</button>
                        </td>
                    </tr>

    </form>
    </tr>
    </html>
