<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <h3 class="miuul_header text-center text-primary display-5 mb-4">Form Register</h3>
                
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">
                        
                        <h4 class="text-center text-success mb-4">Hoşgeldiniz</h4>
                        
                        <form action="#!" method="get" id="register_id" name="register_name">
                            
                            <div class="mb-3">
                                <label for="uname" class="form-label fw-bold">Username:</label>
                                <input type="text" id="uname" required placeholder="Kullanıcı adınız" class="form-control miul_input" title="Kullanıcı adınız" autofocus>
                            </div>

                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Name:</label>
                                <input type="text" id="name" required placeholder="Adınız" class="form-control miul_input" title="Adınızı giriniz">
                            </div>

                            <div class="mb-3">
                                <label for="surname" class="form-label fw-bold">Surname:</label>
                                <input type="text" id="surname" required placeholder="Soyadınız" class="form-control miul_input" title="Soyadınızı giriniz">
                            </div>

                            <div class="mb-3">
                                <label for="uemail" class="form-label fw-bold">Email:</label>
                                <input type="email" id="uemail" required placeholder="Kullanıcı Emailiniz" class="form-control miul_input" title="Emailinizi giriniz">
                            </div>

                            <div class="mb-4">
                                <label for="upassword" class="form-label fw-bold">Password:</label>
                                <input type="password" id="upassword" required placeholder="Kullanıcı şifreniz" class="form-control miul_input" title="Password giriniz" minlength="3" maxlength="10" pattern="[a-zA-Z0-9]{3,10}">
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="reset" class="btn btn-warning">Sıfırla</button>
                                <button type="submit" class="btn btn-primary">Gönder</button>
                            </div>
                            
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
